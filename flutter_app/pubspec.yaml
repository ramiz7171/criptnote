name: criptnote
description: CriptNote - Secure note-taking app with encryption
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Rich text editor
  flutter_quill: ^11.5.0

  # Encryption
  pointycastle: ^3.9.1
  crypto: ^3.0.3

  # Local auth (biometrics/PIN)
  local_auth: ^2.3.0

  # File operations
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  open_filex: ^4.6.0

  # Audio
  record: ^5.2.0
  just_audio: ^0.9.43
  permission_handler: ^11.4.0

  # HTTP / networking
  http: ^1.4.0

  # UI utilities
  flutter_colorpicker: ^1.1.0
  qr_flutter: ^4.1.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  intl: ^0.20.2

  # Storage
  shared_preferences: ^2.3.5

  # Code highlighting
  flutter_highlight: ^0.7.0

  # Icons
  cupertino_icons: ^1.0.8

  # Misc
  uuid: ^4.5.1
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
